name: Validate package index

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  metadata:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Validate sparse metadata
        shell: bash
        run: |
          set -euo pipefail
          find . -mindepth 2 -maxdepth 2 -type f -name '*.json' -print0 |
          while IFS= read -r -d '' file; do
            jq -e '
              (.name | test("^[a-z0-9_-]{2,}$")) and
              (.versions | type == "array" and length > 0) and
              all(.versions[];
                (.version | test("^[0-9]+\\.[0-9]+\\.[0-9]+$")) and
                (.archive | startswith("https://github.com/")) and
                (.checksum | test("^[0-9a-f]{64}$")) and
                (.yanked | type == "boolean")
              )
            ' "$file" >/dev/null
            name=$(jq -r .name "$file")
            test "$file" = "./${name:0:2}/$name.json"
            versions=$(jq -r '.versions[].version' "$file")
            test "$(printf '%s\n' "$versions" | sort -u | wc -l)" -eq "$(printf '%s\n' "$versions" | wc -l)"
          done
