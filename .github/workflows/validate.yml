name: Validate package index

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  metadata:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Validate sparse metadata
        shell: bash
        run: |
          set -euo pipefail

          if [ -n "${GITHUB_BASE_REF:-}" ]; then
            git fetch --no-tags origin "$GITHUB_BASE_REF"
            if git diff --name-only --diff-filter=D "origin/$GITHUB_BASE_REF...HEAD" -- '??/*.json' | grep -q .; then
              echo "Published metadata files cannot be deleted" >&2
              exit 1
            fi
          fi

          find . -mindepth 2 -maxdepth 2 -type f -name '*.json' -print0 |
          while IFS= read -r -d '' file; do
            jq -e '
              (.name | test("^[a-z0-9_-]{2,}$")) and
              (.versions | type == "array" and length > 0) and
              all(.versions[];
                (.version | test("^[0-9]+\\.[0-9]+\\.[0-9]+$")) and
                (.archive | startswith("https://github.com/")) and
                (.checksum | test("^[0-9a-f]{64}$")) and
                (.yanked | type == "boolean")
              )
            ' "$file" >/dev/null
            name=$(jq -r .name "$file")
            test "$file" = "./${name:0:2}/$name.json"
            versions=$(jq -r '.versions[].version' "$file")
            test "$(printf '%s\n' "$versions" | sort -u | wc -l)" -eq "$(printf '%s\n' "$versions" | wc -l)"

            if [ -n "${GITHUB_BASE_REF:-}" ] && git cat-file -e "origin/$GITHUB_BASE_REF:${file#./}" 2>/dev/null; then
              old=$(mktemp)
              git show "origin/$GITHUB_BASE_REF:${file#./}" > "$old"
              jq -e --slurpfile old "$old" '
                . as $new |
                .name == $old[0].name and
                all($old[0].versions[];
                  . as $previous |
                  any($new.versions[];
                      .version == $previous.version and
                      .archive == $previous.archive and
                      .checksum == $previous.checksum and
                      (.yanked == $previous.yanked or
                        ($previous.yanked == false and .yanked == true))
                    )
                )
              ' "$file" >/dev/null
              rm -f "$old"
            fi

            while IFS=$'\t' read -r version archive checksum; do
              work=$(mktemp -d)
              curl --proto '=https' --tlsv1.2 -fsSL --retry 2 \
                -o "$work/package.tar.gz" "$archive"
              printf '%s  %s\n' "$checksum" "$work/package.tar.gz" | sha256sum --check --status
              tar -tzf "$work/package.tar.gz" > "$work/listing"
              tar -tvzf "$work/package.tar.gz" > "$work/types"
              while IFS= read -r member; do
                clean=${member#./}
                case "$clean" in
                  /*|../*|*/../*|*/..) echo "Unsafe archive member: $member" >&2; exit 1 ;;
                esac
              done < "$work/listing"
              if awk 'substr($0, 1, 1) != "-" && substr($0, 1, 1) != "d" { exit 1 }' "$work/types"; then
                :
              else
                echo "Package archive contains links or special files: $name $version" >&2
                exit 1
              fi
              tar -xzf "$work/package.tar.gz" -C "$work"
              test -f "$work/encore.toml"
              manifest_name=$(sed -n 's/^name = "\([^"]*\)"/\1/p' "$work/encore.toml" | head -n 1)
              manifest_version=$(sed -n 's/^version = "\([^"]*\)"/\1/p' "$work/encore.toml" | head -n 1)
              test "$manifest_name" = "$name"
              test "$manifest_version" = "$version"
              if grep -Fq 'path@' "$work/encore.toml"; then
                echo "Published package $name $version contains a path dependency" >&2
                exit 1
              fi

              declare -A workspace_state=()
              declare -A workspace_names=()
              validate_workspace_manifest() {
                local relative=$1
                local manifest="$work/$relative/encore.toml"
                local package_name dependency dependency_name dependency_relative

                if [ "${workspace_state[$relative]:-}" = visiting ]; then
                  echo "workspace@ dependency cycle at $relative in $name $version" >&2
                  return 1
                fi
                if [ "${workspace_state[$relative]:-}" = done ]; then
                  return 0
                fi
                test -f "$manifest" || {
                  echo "Missing $relative/encore.toml in $name $version" >&2
                  return 1
                }
                workspace_state[$relative]=visiting
                package_name=$(sed -n 's/^name = "\([^"]*\)"/\1/p' "$manifest" | head -n 1)
                [[ "$package_name" =~ ^[a-z0-9_-]{2,}$ ]] || {
                  echo "Invalid package name in $relative/encore.toml" >&2
                  return 1
                }
                if [ -n "${workspace_names[$package_name]:-}" ] && [ "${workspace_names[$package_name]}" != "$relative" ]; then
                  echo "Duplicate refrain name $package_name in $name $version" >&2
                  return 1
                fi
                workspace_names[$package_name]=$relative
                if grep -Fq 'path@' "$manifest"; then
                  echo "Published package $name $version contains a path dependency in $relative" >&2
                  return 1
                fi
                while IFS= read -r dependency; do
                  [ -n "$dependency" ] || continue
                  dependency_name=${dependency#workspace@}
                  [[ "$dependency_name" =~ ^[a-z0-9_-]{2,}$ ]] || {
                    echo "Invalid workspace dependency $dependency in $relative" >&2
                    return 1
                  }
                  dependency_relative="workspace/$dependency_name"
                  validate_workspace_manifest "$dependency_relative" || return 1
                done < <(grep -oE 'workspace@[a-zA-Z0-9_-]+' "$manifest" | sort -u || true)
                workspace_state[$relative]=done
              }
              validate_workspace_manifest "."
              while IFS= read -r embedded_manifest; do
                relative=${embedded_manifest#"$work/"}
                relative=${relative%/encore.toml}
                validate_workspace_manifest "$relative"
              done < <(find "$work/workspace" -mindepth 2 -maxdepth 2 -type f -name encore.toml -print 2>/dev/null | sort)
              unset workspace_state workspace_names
              unset -f validate_workspace_manifest
              rm -rf "$work"
            done < <(jq -r '.versions[] | [.version, .archive, .checksum] | @tsv' "$file")
          done
